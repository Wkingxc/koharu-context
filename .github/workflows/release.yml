name: Release Windows NSIS

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  release-windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: oven-sh/setup-bun@v2

      - uses: Swatinem/rust-cache@v2

      - name: Install CUDA Toolkit
        uses: Jimver/cuda-toolkit@master
        with:
          cuda: '13.0.0'
          method: 'network'
          sub-packages: '["nvcc", "cudart", "crt", "thrust", "nvvm", "cublas", "cublas_dev", "cufft", "cufft_dev", "curand", "curand_dev", "nvrtc", "nvrtc_dev"]'
          log-file-suffix: 'windows-2022.txt'

      - name: Configure MSVC Build Tools
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify release version
        shell: bash
        run: |
          expected="${GITHUB_REF_NAME#v}"
          actual="$(sed -n '/\[workspace.package\]/,/^\[/s/^version = "\([^"]*\)"/\1/p' Cargo.toml)"
          test "$actual" = "$expected"

      - name: Generate release notes
        id: release_notes
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          {
            echo 'release_body<<EOF'
            bun git-cliff --current --strip all
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Build and publish NSIS installer
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tauriScript: npx @tauri-apps/cli
          tagName: ${{ github.ref_name }}
          releaseName: ${{ github.ref_name }}
          releaseBody: ${{ steps.release_notes.outputs.release_body }}
          releaseDraft: false
          prerelease: false
          args: --bundles nsis
