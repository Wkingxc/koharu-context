name: Release Windows NSIS

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag
        required: true
        default: v1.0.0
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  release-windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          fetch-tags: true
          ref: ${{ env.RELEASE_TAG }}

      - uses: oven-sh/setup-bun@v2

      - uses: Swatinem/rust-cache@v2

      - name: Install CUDA Toolkit
        uses: Jimver/cuda-toolkit@master
        with:
          cuda: '13.0.0'
          method: 'network'
          sub-packages: '["nvcc", "cudart", "crt", "thrust", "nvvm", "cublas", "cublas_dev", "cufft", "cufft_dev", "curand", "curand_dev", "nvrtc", "nvrtc_dev"]'
          log-file-suffix: 'windows-2022.txt'

      - name: Configure MSVC Build Tools
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify release version
        shell: bash
        run: |
          expected="${RELEASE_TAG#v}"
          actual="$(sed -n '/\[workspace.package\]/,/^\[/s/^version = "\([^"]*\)"/\1/p' Cargo.toml)"
          test "$actual" = "$expected"

      - name: Build and publish NSIS installer
        uses: tauri-apps/tauri-action@v0
        env:
          CARGO_BUILD_JOBS: 1
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tauriScript: npx @tauri-apps/cli
          tagName: ${{ env.RELEASE_TAG }}
          releaseName: ${{ env.RELEASE_TAG }}
          releaseBody: |
            Windows x64 NSIS installer for `${{ env.RELEASE_TAG }}`.

            Download the `x64-setup.exe` asset below and run it to install Koharu Context.
          releaseDraft: false
          prerelease: false
          args: --bundles nsis
